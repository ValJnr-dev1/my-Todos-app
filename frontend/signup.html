<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign up · TodoFlow</title>
    <style>
        * { margin:0; padding:0; box-sizing: border-box; font-family: system-ui; }
        body {
            background: linear-gradient(135deg, #f5f7fe 0%, #e9eef5 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
        }
        .card {
            background: white;
            max-width: 500px;
            width: 100%;
            border-radius: 2rem;
            padding: 2rem;
            box-shadow: 0 20px 35px rgba(0,0,0,0.1);
        }
        h1 { font-size: 2rem; margin-bottom: 1.5rem; color: #1e2b3c; }
        .form-group { margin-bottom: 1rem; }
        label { display: block; font-weight: 600; margin-bottom: 0.3rem; color: #2c3e4e; }
        input {
            width: 100%;
            padding: 0.8rem 1rem;
            border-radius: 1rem;
            border: 1px solid #cbd5e1;
            font-size: 1rem;
        }
        button {
            width: 100%;
            background: #2c6e9e;
            color: white;
            border: none;
            padding: 0.8rem;
            border-radius: 2rem;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 0.5rem;
        }
        button:hover { background: #1f5379; }
        .link {
            text-align: center;
            margin-top: 1.5rem;
        }
        .link a { color: #2c6e9e; text-decoration: none; font-weight: 500; }
        .error-msg, .success-msg {
            border-radius: 1rem;
            padding: 0.6rem;
            margin-bottom: 1rem;
            text-align: center;
        }
        .error-msg { background: #fee2e2; color: #b91c1c; }
        .success-msg { background: #dcfce7; color: #15803d; }
    </style>
</head>
<body>
<div class="card">
    <h1>📝 Create account</h1>
    <div id="messageArea"></div>
    <div class="form-group">
        <label>First name</label>
        <input type="text" id="firstName" placeholder="John">
    </div>
    <div class="form-group">
        <label>Last name</label>
        <input type="text" id="lastName" placeholder="Doe">
    </div>
    <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="john@example.com">
    </div>
    <div class="form-group">
        <label>Password (min 8 characters)</label>
        <input type="password" id="password" placeholder="········">
    </div>
    <button id="signupBtn">Register →</button>
    <div class="link">
        Already have an account? <a href="login.html">Login here</a>
    </div>
</div>
<script>
    const API_BASE = 'http://localhost:8000/api/v1';
    async function registerUser(firstName, lastName, email, password) {
        try {
            const res = await fetch(`${API_BASE}/auth/register`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    first_name: firstName,
                    last_name: lastName,
                    email,
                    password
                })
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.detail || 'Registration failed');
            showMessage('✅ Account created! Redirecting to login...', false);
            setTimeout(() => { window.location.href = 'login.html'; }, 1500);
        } catch (err) {
            showMessage(err.message, true);
        }
    }
    function showMessage(msg, isError) {
        const div = document.getElementById('messageArea');
        div.textContent = msg;
        div.className = isError ? 'error-msg' : 'success-msg';
        setTimeout(() => { if(div.textContent === msg) div.textContent = ''; }, 3000);
    }
    document.getElementById('signupBtn').addEventListener('click', () => {
        const firstName = document.getElementById('firstName').value.trim();
        const lastName = document.getElementById('lastName').value.trim();
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        if (!firstName || !lastName || !email || !password) {
            showMessage('All fields are required', true);
            return;
        }
        if (password.length < 8) {
            showMessage('Password must be at least 8 characters', true);
            return;
        }
        registerUser(firstName, lastName, email, password);
    });
</script>
</body>
</html>
