<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login · TodoFlow</title>
    <style>
        * { margin:0; padding:0; box-sizing: border-box; font-family: system-ui; }
        body {
            background: linear-gradient(135deg, #f5f7fe 0%, #e9eef5 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
        }
        .card {
            background: white;
            max-width: 450px;
            width: 100%;
            border-radius: 2rem;
            padding: 2rem;
            box-shadow: 0 20px 35px rgba(0,0,0,0.1);
        }
        h1 { font-size: 2rem; margin-bottom: 1.5rem; color: #1e2b3c; }
        .form-group { margin-bottom: 1.2rem; }
        label { display: block; font-weight: 600; margin-bottom: 0.3rem; color: #2c3e4e; }
        input {
            width: 100%;
            padding: 0.8rem 1rem;
            border-radius: 1rem;
            border: 1px solid #cbd5e1;
            font-size: 1rem;
        }
        button {
            width: 100%;
            background: #2c6e9e;
            color: white;
            border: none;
            padding: 0.8rem;
            border-radius: 2rem;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 0.5rem;
        }
        button:hover { background: #1f5379; }
        .link {
            text-align: center;
            margin-top: 1.5rem;
        }
        .link a { color: #2c6e9e; text-decoration: none; font-weight: 500; }
        .error-msg, .success-msg {
            border-radius: 1rem;
            padding: 0.6rem;
            margin-bottom: 1rem;
            text-align: center;
        }
        .error-msg { background: #fee2e2; color: #b91c1c; }
        .success-msg { background: #dcfce7; color: #15803d; }
    </style>
</head>
<body>
<div class="card">
    <h1>🔐 Login</h1>
    <div id="messageArea"></div>
    <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="user@example.com">
    </div>
    <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="········">
    </div>
    <button id="loginBtn">Login →</button>
    <div class="link">
        Don't have an account? <a href="signup.html">Sign up here</a>
    </div>
</div>
<script>
    const API_BASE = 'https://my-todo-api-9vac.onrender.com/api';
    async function loginUser(email, password) {
        try {
            const res = await fetch(`${API_BASE}/auth/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.detail || 'Login failed');
            localStorage.setItem('access_token', data.access_token);
            window.location.href = 'todos.html';
        } catch (err) {
            showMessage(err.message, true);
        }
    }
    function showMessage(msg, isError) {
        const div = document.getElementById('messageArea');
        div.textContent = msg;
        div.className = isError ? 'error-msg' : 'success-msg';
        setTimeout(() => { div.textContent = ''; div.className = ''; }, 3000);
    }
    document.getElementById('loginBtn').addEventListener('click', () => {
        const email = document.getElementById('email').value.trim();
        const pwd = document.getElementById('password').value;
        if (!email || !pwd) { showMessage('Email and password required', true); return; }
        loginUser(email, pwd);
    });
    document.getElementById('password').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') document.getElementById('loginBtn').click();
    });
</script>
</body>
</html>
